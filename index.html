<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Beachtune - Music Made for Humans, by Humans. 7-string classical guitar music that transcends.">
    <title>Beachtune | Music That Transcends</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.7;
            color: #2a2a2a;
            background: #fafafa;
        }
        
        header {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 2rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 2rem;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: -0.5px;
            color: #1a1a1a;
        }
        
        .tagline {
            font-size: 1.1rem;
            color: #666;
            font-weight: 400;
            margin-top: 0.5rem;
        }
        
        .hero {
            position: relative;
            color: #fff;
            padding: 8rem 0;
            text-align: center;
            min-height: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .hero-bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: 50% 50%;
            z-index: 1;
        }
        
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.6));
            z-index: 2;
        }
        
        .hero-content {
            position: relative;
            z-index: 3;
            width: 100%;
        }
        
        .hero h2 {
            font-size: 3.5rem;
            font-weight: 300;
            margin-bottom: 2rem;
            letter-spacing: -0.5px;
            line-height: 1.2;
            text-shadow: 0 2px 20px rgba(0,0,0,0.5);
        }
        
        .hero p {
            font-size: 1.3rem;
            max-width: 750px;
            margin: 0 auto;
            color: #f0f0f0;
            line-height: 1.8;
            text-shadow: 0 1px 10px rgba(0,0,0,0.5);
        }
        
        .seven-string-feature {
            background: #fff;
            padding: 5rem 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 3rem;
            margin-top: 3rem;
        }
        
        .feature-item {
            text-align: center;
        }
        
        .feature-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.8;
        }
        
        .feature-item h4 {
            font-size: 1.3rem;
            font-weight: 500;
            margin-bottom: 1rem;
            color: #1a1a1a;
        }
        
        .feature-item p {
            color: #666;
            line-height: 1.7;
            font-size: 1.05rem;
        }
        
        section {
            padding: 4rem 0;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
        }
        
        section:nth-child(even) {
            background: #fafafa;
        }
        
        h3 {
            font-size: 1.8rem;
            font-weight: 300;
            margin-bottom: 2rem;
            color: #1a1a1a;
            text-align: center;
            letter-spacing: -0.3px;
        }
        
        .section-subtitle {
            text-align: center;
            color: #666;
            max-width: 700px;
            margin: -1rem auto 3rem;
            font-size: 1.1rem;
        }
        
        .streaming-links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-top: 2rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .streaming-link {
            display: block;
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .streaming-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.12);
        }
        
        .streaming-link.spotify {
            background: linear-gradient(135deg, #1ed760 0%, #1db954 100%);
            color: white;
        }
        
        .streaming-link.spotify:hover {
            box-shadow: 0 6px 20px rgba(29, 185, 84, 0.3);
        }
        
        .streaming-link.youtube {
            background: linear-gradient(135deg, #ff1744 0%, #d32f2f 100%);
            color: white;
        }
        
        .streaming-link.youtube:hover {
            box-shadow: 0 6px 20px rgba(211, 47, 47, 0.3);
        }
        
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            max-width: 800px;
            margin: 2rem auto;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .bio-content {
            max-width: 700px;
            margin: 0 auto;
        }
        
        .bio-content p {
            margin-bottom: 1.5rem;
            color: #444;
            font-size: 1.05rem;
        }
        
        .bio-highlight {
            background: #f5f5f5;
            border-left: 4px solid #1a1a1a;
            padding: 1.5rem 2rem;
            margin: 2rem 0;
            font-size: 1.15rem;
            font-style: italic;
            color: #333;
        }
        
        .email-signup {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        
        .email-signup p {
            margin-bottom: 1.5rem;
            color: #666;
        }
        
        .email-form {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .email-form input {
            flex: 1;
            padding: 1rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
        }
        
        .email-form button {
            padding: 1rem 2rem;
            background: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        
        .email-form button:hover {
            background: #333;
        }
        
        .contact-form {
            max-width: 600px;
            margin: 2rem auto;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #444;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 1rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
        }

            resize: vertical;
        }
